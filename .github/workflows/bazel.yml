name: Bazel Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Install Bazel(NO WINDOWS)
        uses: bazel-contrib/setup-bazel@0.15.0
        if: ${{matrix.os != 'windows-latest'}}
        with:
          bazelisk-version: 1.x
          # Avoid downloading Bazel every time.
          bazelisk-cache: true
          # Store build cache per workflow.
          disk-cache: ${{ github.workflow }}
          # Share repository cache between workflows.
          repository-cache: true
          bazelrc: |
            build --cxxopt='-std=c++17'
      - name: Install Bazel(WINDOWS)
        if: ${{matrix.os == 'windows-latest'}}
        uses: bazel-contrib/setup-bazel@0.15.0
        with: 
          bazelisk-version: 1.x
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true
          bazelrc: |
            build --cxxopt='/std:c++17'
            build --cxxopt='/utf-8'
            build --features=static_link_msvcrt

      - name: Bazel Test
        run: |
          bazel test kpipeline/... --test_output=errors --test_verbose_timeout_warnings
        continue-on-error: true

      - name: Show Test Logs on Failure
        if: failure()
        shell: bash
        run: |
          echo "=== Test Failures ==="
          # 查找所有失败的测试日志
          find bazel-testlogs -name "test.log" -exec sh -c 'echo "--- {} ---"; cat "{}"; echo ""' \;
          exit 1
  example:
    needs: build
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    name: Build example
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Install Bazel(NO WINDOWS)
        uses: bazel-contrib/setup-bazel@0.15.0
        if: ${{matrix.os != 'windows-latest'}}
        with:
          bazelisk-version: 1.x
          disk-cache: ${{ github.workflow }}
          bazelisk-cache: true
          repository-cache: true
          bazelrc: |
            build --cxxopt='-std=c++17'
      - name: Install Bazel(WINDOWS)
        if: ${{matrix.os == 'windows-latest'}}
        uses: bazel-contrib/setup-bazel@0.15.0
        with: 
          bazelisk-version: 1.x
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true
          bazelrc: |
            build --cxxopt='/std:c++17'
            build --cxxopt='/utf-8'
            build --features=static_link_msvcrt
      - name: Bazel Build examples
        run: |
          cd examples
          bazel build //...
          cd ..
